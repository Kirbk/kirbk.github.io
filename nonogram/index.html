<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonogram</title>
  <style>
    body {
      padding: 0;
      margin: 0;
      background-color: #f2fffe;
    }
    .plant {
      position: fixed;
      bottom: 0;
      right: 0;
      padding: 1%;
    }
  </style>
  <script src="./lib/p5.js"></script>
  <script src="sketch.js"></script>
  <style>
    div#win {
      font-size: xx-large;
      padding-left: 10%;
    }
    .slidecontainer {
      padding: 1%;
    }
    #wins-container {
      padding: 1%;
      font-family: sans-serif;
    }
    #wins-container h3 {
      margin: 0 0 0.5em 0;
    }
    #wins-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75em;
      font-size: 0.95em;
    }
    #wins-list .win-item {
      background: #e0f7f5;
      padding: 0.35em 0.75em;
      border-radius: 4px;
    }
    #wins-list .win-item.current {
      background: #b8ebe6;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="slidecontainer">
    <label>Difficulty</label>
    <input type="range" min="20" max="80" value="50" step="10" class="slider" id="difficulty" />
    <input type="button" id="diff_button" value="Set Difficulty" /> 
  </div>
  <div id="wins-container">
    <h3>Total wins (global)</h3>
    <div id="wins-list">Loading&hellip;</div>
  </div>
  <main>
  </main>
    <div id="win" class="plant"></div>
</body>

</html>
